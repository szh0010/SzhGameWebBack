<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>便签墙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sticky-note {
            transition: transform 0.2s;
            box-shadow: 5px 5px 7px rgba(33,33,33,.7);
        }
        .sticky-note:hover {
            transform: scale(1.05) rotate(1deg);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="mb-6">
            <a href="/game-selection" class="inline-flex items-center text-blue-600 hover:text-blue-800 transition-colors font-medium">
                <span class="mr-1 text-xl">←</span> 返回游戏大厅
            </a>
        </div>

        <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">📌 我的便签墙</h1>

        <div class="bg-white p-6 rounded-lg shadow-md mb-12 border border-gray-200">
            <input id="title" type="text" placeholder="标题" class="w-full mb-3 p-2 border rounded focus:ring-2 focus:ring-yellow-300 outline-none">
            <textarea id="content" placeholder="写点什么内容呢..." class="w-full mb-3 p-2 border rounded h-24 focus:ring-2 focus:ring-yellow-300 outline-none"></textarea>
            <button onclick="postNote()" class="bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold py-2 px-6 rounded shadow-sm active:transform active:scale-95 transition-all">
                贴上便签
            </button>
        </div>

        <div id="note-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="text-gray-500 italic text-center col-span-full">正在努力加载便签...</p>
        </div>
    </div>

    <script>
        // 1. 获取所有便签并渲染
        async function fetchNotes() {
            try {
                const response = await fetch('/api/board/notes/');
                const notes = await response.json();
                const container = document.getElementById('note-container');
                container.innerHTML = ''; 

                if (notes.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center col-span-full">墙上空空如也，来贴第一张便签吧！</p>';
                    return;
                }

                notes.forEach(note => {
                    const colors = ['bg-yellow-200', 'bg-blue-200', 'bg-green-200', 'bg-pink-200'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    const date = new Date(note.created_at);
                    const formattedTime = date.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    container.innerHTML += `
                        <div class="sticky-note ${randomColor} p-6 h-64 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start border-b border-black/10 mb-2 pb-1">
                                    <h3 class="font-bold text-xl truncate pr-2" title="${note.title}">${note.title}</h3>
                                    <span class="text-[10px] text-gray-600 whitespace-nowrap mt-1">${formattedTime}</span>
                                </div>
                                <p class="text-gray-700 overflow-y-auto h-32 text-sm leading-relaxed">${note.content}</p>
                            </div>
                            <div class="text-xs text-gray-500 mt-4 flex justify-between items-center">
                                <span class="font-medium italic">👤 ${note.user}</span>
                                <button onclick="deleteNote(${note.id})" class="text-red-500 hover:text-red-700 hover:font-bold transition-colors">删除</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("加载失败:", error);
            }
        }

        // 2. 发布新便签
        async function postNote() {
            const titleInput = document.getElementById('title');
            const contentInput = document.getElementById('content');
            const title = titleInput.value;
            const content = contentInput.value;

            if (!title.trim() || !content.trim()) {
                alert("标题和内容都得写哦！");
                return;
            }

            const response = await fetch('/api/board/notes/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ title, content })
            });

            if (response.ok) {
                titleInput.value = '';
                contentInput.value = '';
                fetchNotes(); 
            } else {
                const errorData = await response.json();
                alert('发布失败：' + (errorData.detail || '请检查是否已登录'));
            }
        }

        // 3. 删除便签
        async function deleteNote(id) {
            if (!confirm("确定要撕掉这张便签吗？")) return;

            const response = await fetch(`/api/board/notes/${id}/`, {
                method: 'DELETE',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });

            if (response.ok) {
                fetchNotes();
            } else {
                alert('权限不足：你只能删除自己贴的便签哦！');
            }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        fetchNotes();
    </script>
</body>
</html>
